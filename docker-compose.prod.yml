# Production overlay:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  web:
    ports: !override
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
