apiVersion: v1
kind: ConfigMap
metadata: { name: app-config }
data:
  NODE_ENV: "development"
  PORT: "4173"
  APP_BASE_URL: "http://localhost:4173"
  DEV_LOGIN_ENABLED: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: learning-tracker
  labels: { app: learning-tracker }
spec:
  replicas: 1
  selector: { matchLabels: { app: learning-tracker } }
  template:
    metadata: { labels: { app: learning-tracker } }
    spec:
      imagePullSecrets: [ { name: ghcr-pull } ]
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: app
          image: ghcr.io/pvsafwa/learning-tracker:PUT_YOUR_LATEST_SHA   # set the real tag directly
          ports: [ { containerPort: 4173 } ]
          envFrom:
            - configMapRef: { name: app-config }
            - secretRef:    { name: app-secret }
          startupProbe:
            httpGet: { path: /healthz, port: 4173 }
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet: { path: /healthz, port: 4173 }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: 4173 }
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { memory: "512Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata: { name: learning-tracker }
spec:
  selector: { app: learning-tracker }
  ports: [ { port: 80, targetPort: 4173 } ]
